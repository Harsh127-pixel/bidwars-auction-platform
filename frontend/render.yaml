services:
  - type: web
    name: frontend-bidwars
    env: static
    buildCommand: npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://backend-bidwars.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://backend-bidwars.onrender.com
      - key: VITE_ADMIN_EMAIL
        value: admin@bidwars.elite
      - key: VITE_FIREBASE_API_KEY
        value: AIzaSyASBLFO22bn6ORWBogY9g8FDib7CIPCcvE
      - key: VITE_FIREBASE_AUTH_DOMAIN
        value: bidwars-auction-platform.firebaseapp.com
      - key: VITE_FIREBASE_PROJECT_ID
        value: bidwars-auction-platform
      - key: VITE_FIREBASE_STORAGE_BUCKET
        value: bidwars-auction-platform.firebasestorage.app
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        value: 1099002230057
      - key: VITE_FIREBASE_APP_ID
        value: 1:1099002230057:web:887f367d5bce5ac7c3b338
