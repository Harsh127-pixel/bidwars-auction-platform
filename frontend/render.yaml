# Render Static Site configuration for Vue/Vite frontend
services:
  - type: web
    name: frontend-bidwars
    env: static
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://backend-bidwars.onrender.com/api
      # Add other VITE_ env vars as needed
