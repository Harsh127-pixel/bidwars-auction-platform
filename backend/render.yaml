services:
  - type: web
    name: backend-bidwars
    runtime: node
    plan: free
    region: oregon
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: CLIENT_ORIGINS
        value: https://bidwarss.vercel.app,https://bidwars.gaurangjadoun.in,https://bidwars.gaurangjadoun.me
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_EMAILS
        sync: false
