services:
  - type: web
    name: bidwars-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: NODE_VERSION
        value: "20"
