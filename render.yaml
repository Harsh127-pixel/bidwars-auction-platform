# Render Project Blueprint
version: "1"
projects:
- name: BidWars
  environments:
  - name: Production
    services:
    - type: web
      name: bidwars-backend
      runtime: node
      plan: free
      region: oregon
      rootDir: backend
      buildCommand: npm install
      startCommand: npm start
      autoDeployTrigger: true
      envVars:
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "10000"
