# Render Blueprint Blueprint Configuration
version: "1"
services:
  - type: web
    name: bidwars-backend
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: node server.js
    rootDir: backend
    autoDeployTrigger: true
    envVars:
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
